  <script>
    (function() {
      emailjs.init({ publicKey: "hLBrULwvuQVqGeqlz" });
    })();

    window.sendContactEmail = function(fromName, fromEmail, service, message) {
      return emailjs.send("service_18s7gd4", "template_zn5tfic", {

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #0a0a0a; overflow: hidden; }
    #loading {
      position: fixed; inset: 0; display: flex;
      flex-direction: column; align-items: center;
      justify-content: center; background: #0a0a0a;
      gap: 24px; z-index: 9999; transition: opacity 0.5s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .loader-name { font-family: 'Courier New', monospace; font-size: 13px; font-weight: 700; letter-spacing: 6px; color: #ffffff; }
    .loader-bar { width: 120px; height: 1px; background: #1a1a1a; position: relative; overflow: hidden; }
    .loader-bar::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: #ffffff; animation: load 1.2s ease-in-out infinite; }
    @keyframes load { to { left: 100%; } }
    .loader-sub { font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 3px; color: #404040; }
  </style>

<body>
  <div id="loading">

  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      const loader = document.getElementById('loading');
      loader.classList.add('hidden');
      setTimeout(() => loader.remove(), 600);
    });
  </script>
